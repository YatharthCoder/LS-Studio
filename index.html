<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yatharth V2 Studio</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            transition: background-color 0.5s ease;
        }
        header {
            background-color: #282c34;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }
        h1 {
            color: #61dafb;
            animation: fadeIn 1s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        /* Additional styles for other sections */
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Yatharth V2 Studio</h1>
    </header>
    <main>
        <section id="about">
            <h2>About</h2>
            <p>This is an enhanced version that focuses on beautiful visuals and smooth transitions.</p>
        </section>
        <footer>
            <p>&copy; 2026 YatharthCoder</p>
        </footer>
    </main>
    <script>
        window.onload = function() {
            document.body.style.backgroundColor = '#f0f0f0';
        };
    </script>
</body>
</html>
